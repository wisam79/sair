name: Deploy to Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual deployment)"
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy Migrations & Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        if: ${{ inputs.dry_run != true }}
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Dry Run - Check Migrations
        if: ${{ inputs.dry_run == true }}
        run: supabase db diff --schema public

      - name: Deploy Edge Functions
        if: ${{ inputs.dry_run != true }}
        run: |
          supabase functions deploy atomic-booking --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy trip-engine --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function Secrets
        if: ${{ inputs.dry_run != true }}
        run: |
          supabase secrets set \
            SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            ADMIN_URL=${{ secrets.ADMIN_URL }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify Deployment
        if: ${{ inputs.dry_run != true }}
        run: |
          echo "Checking Edge Functions are active..."
          supabase functions list --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
