name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level moderate
          echo "::notice::Audit completed - no moderate or higher vulnerabilities found"
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: License Check
        run: npx license-checker --summary --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;ISC;CC0-1.0;Unlicense" || true
        continue-on-error: true

  sql-review:
    name: SQL Migration Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous SQL patterns
        run: |
          issues=0
          for f in supabase/migrations/*.sql; do
            echo "Reviewing $f..."

            if grep -qi "DROP TABLE" "$f"; then
              echo "::warning file=$f::Contains DROP TABLE - ensure this is intentional"
              issues=$((issues + 1))
            fi

            if grep -qi "DISABLE TRIGGER" "$f"; then
              echo "::error file=$f::Contains DISABLE TRIGGER - security risk"
              issues=$((issues + 1))
            fi

            if grep -qi "GRANT ALL" "$f"; then
              echo "::warning file=$f::Contains GRANT ALL - may be too permissive"
              issues=$((issues + 1))
            fi

            if ! grep -qi "ENABLE ROW LEVEL SECURITY\|FORCE ROW LEVEL SECURITY" "$f" && grep -qi "CREATE TABLE" "$f"; then
              echo "::warning file=$f::New table without RLS enabled"
              issues=$((issues + 1))
            fi
          done

          if [ $issues -gt 0 ]; then
            echo "::notice::$issues potential SQL issues found - review warnings above"
          else
            echo "No SQL issues detected"
          fi
