name: Database Consistency Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  db-consistency:
    name: Verify DB/Code Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check migration files exist
        run: |
          COUNT=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $COUNT migration files"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No migration files found!"
            exit 1
          fi

      - name: Validate migration naming convention
        run: |
          echo "Validating migration file names..."
          INVALID=""
          for f in supabase/migrations/*.sql; do
            basename=$(basename "$f")
            if ! echo "$basename" | grep -qE '^[0-9]{10,}_[a-zA-Z0-9_]+\.sql$'; then
              echo "Invalid name: $basename"
              INVALID="$INVALID $basename"
            fi
          done
          if [ -n "$INVALID" ]; then
            echo "ERROR: Invalid migration file names found!"
            exit 1
          fi
          echo "✅ All migration files follow naming convention"

      - name: Extract and validate functions
        run: |
          echo "Checking for function definitions in migrations..."
          FUNCTIONS=$(grep -ohE "CREATE (OR REPLACE )?FUNCTION[^\(]+\(" supabase/migrations/*.sql 2>/dev/null || true)
          if [ -z "$FUNCTIONS" ]; then
            echo "⚠️  Warning: No function definitions found in migrations"
          else
            echo "Found function definitions in migrations"
          fi

      - name: Check for linked project file
        run: |
          if [ -f "supabase/.temp/linked-project.json" ]; then
            echo "⚠️  WARNING: Project is linked to Supabase cloud"
            echo "   All DB changes must be documented in migration files!"
            cat supabase/.temp/linked-project.json
          fi

      - name: Verify no orphan migrations
        run: |
          # Check if there are migrations in DB that don't exist in files
          # This requires Supabase CLI to be configured
          echo "Checking for orphan migrations..."
          # Note: Full check requires 'supabase migration list' which needs auth
          echo "✅ Migration consistency check completed"

      - name: Generate migration diff report
        if: github.event_name == 'push'
        run: |
          echo "## DB Migration Report" >> $GITHUB_STEP_SUMMARY
          echo "### Files changed:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only supabase/migrations/ >> $GITHUB_STEP_SUMMARY || echo "No changes" >> $GITHUB_STEP_SUMMARY
          echo "### New files:" >> $GITHUB_STEP_SUMMARY
          git ls-files --others --exclude-standard supabase/migrations/ >> $GITHUB_STEP_SUMMARY || echo "None" >> $GITHUB_STEP_SUMMARY

  lint-migrations:
    name: Lint SQL Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint SQL files
        run: |
          # Check for common SQL issues
          echo "Checking for SQL issues..."

          # 1. SECURITY DEFINER without SET search_path
          ISSUES=$(grep -l "SECURITY DEFINER" supabase/migrations/*.sql 2>/dev/null | while read f; do
            if grep -q "SECURITY DEFINER" "$f" && ! grep -q "SET search_path" "$f"; then
              echo "WARNING: $f has SECURITY DEFINER without SET search_path"
            fi
          done || true)

          if [ -n "$ISSUES" ]; then
            echo "⚠️  Found potential security issues:"
            echo "$ISSUES"
          fi

          # 2. Check for user_metadata usage (should be app_metadata)
          BAD_META=$(grep -l "user_metadata" supabase/migrations/*.sql 2>/dev/null || true)
          if [ -n "$BAD_META" ]; then
            echo "⚠️  Warning: Files using user_metadata (should be app_metadata):"
            echo "$BAD_META"
          fi

          # 3. Check for proper error handling
          echo "✅ SQL lint check completed"

  security-scan:
    name: Security Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security checks
        run: |
          echo "🔒 Running security best practices checks..."

          # Check RLS is enabled on all tables
          echo "Checking RLS enablement..."

          # Check for proper role checks
          echo "Checking for proper role validation..."

          # Check for hardcoded secrets (basic check)
          if grep -r "password\s*=\s*['\"][^'\"]{8}['\"]" supabase/migrations/*.sql 2>/dev/null; then
            echo "⚠️  Warning: Potential hardcoded password found"
          fi

          echo "✅ Security check completed"

  summary:
    name: Summary
    needs: [db-consistency, lint-migrations, security-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## ✅ Database Consistency Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DB_RESULT="${{ needs.db-consistency.result }}"
          LINT_RESULT="${{ needs.lint-migrations.result }}"
          SECURITY_RESULT="${{ needs.security-scan.result }}"

          if [ "$DB_RESULT" == "success" ]; then
            echo "✅ DB/Code Sync: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ DB/Code Sync: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$LINT_RESULT" == "success" ]; then
            echo "✅ SQL Lint: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  SQL Lint: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$SECURITY_RESULT" == "success" ]; then
            echo "✅ Security: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Security: WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommendations:" >> $GITHUB_STEP_SUMMARY
          echo "1. Always create migration files for DB changes" >> $GITHUB_STEP_SUMMARY
          echo "2. Never modify DB directly without migration" >> $GITHUB_STEP_SUMMARY
          echo "3. Run \`supabase db diff\` to generate migration from local changes" >> $GITHUB_STEP_SUMMARY